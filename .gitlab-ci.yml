#
# e2e test setup on the dae-* runners via Docker-outside-of-Docker (DooD): run the
# compose stack against the HOST docker daemon (mounted /var/run/docker.sock), no
# docker:dind sidecar.
#
# Unlike the pure e2e-benchmark variant this replaced, this pipeline BUILDS the
# provisioning images from the current commit (Kaniko, tagged with the
# RELEASE_VERSION computed by semantic-release) and runs the e2e stack against
# them. The benchmark variant pinned every image to a published release
# (IMAGE_TAG=0.70.19), so code changes on the branch were never exercised.
#
#   pre-semantic-release  -> populate RELEASE_VERSION (=> image tag)
#   container-build       -> build & push the provisioning images (Kaniko)
#   e2e-dae-{s,m,l,xl}    -> DooD e2e against the freshly built images, one per
#                            runner flavor (also samples the formerly-flaky suite).
#
# The full upstream pipeline is parked in .gitlab-ci.yml-old.

---

include:
  - project: "univention/dev/nubus-for-k8s/common-ci"
    ref: "v1.61.2"
    file:
      # Standard stage list (provides "build" and "test").
      - "defaults/stages.yaml"
      # Provides .pre-semantic-release (publishes RELEASE_VERSION as a dotenv).
      - "templates/semantic-release-env.yaml"
      # Provides the Kaniko-based `container-build` job.
      - "jobs/container-build.yaml"

# Deduplicate pipelines. The included jobs carry catch-all rules
# (when: always / when: on_success) that also match `merge_request_event`, so an
# open MR would otherwise spawn BOTH a branch pipeline and a merge-request
# pipeline for the same commit. Suppress the MR pipeline and keep the branch
# pipeline (which is what the dae-* debugging is watched on).
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - when: always

default:
  tags:
    - "dae-s"

variables:
  # DooD: talk to the host daemon via the mounted socket, not a dind service.
  DOCKER_HOST: "unix:///var/run/docker.sock"
  # Make the test-profile services (e2e-test) addressable by pull/run.
  COMPOSE_PROFILES: "test"

# Runs in the built-in ".pre" stage; exports RELEASE_VERSION via deploy.env.
pre-semantic-release:
  extends: ".pre-semantic-release"

# Build every provisioning image the e2e compose stack pulls, from the current
# commit. Kaniko tags them with RELEASE_VERSION (from the pre-semantic-release
# dotenv) and pushes to ${CI_REGISTRY_IMAGE}/<image>:<RELEASE_VERSION> -- exactly
# what docker-compose.yaml references via ${IMAGE_TAG}.
.build-matrix: &build-matrix
  - IMAGE_NAME: "provisioning-api"
    DOCKERFILE_PATH: "docker/events-and-consumer-api/Dockerfile"
  - IMAGE_NAME: "provisioning-dispatcher"
    DOCKERFILE_PATH: "docker/dispatcher/Dockerfile"
  - IMAGE_NAME: "provisioning-prefill"
    DOCKERFILE_PATH: "docker/prefill/Dockerfile"
  - IMAGE_NAME: "provisioning-udm-listener"
    DOCKERFILE_PATH: "docker/udm-listener/Dockerfile"
  - IMAGE_NAME: "provisioning-udm-transformer"
    DOCKERFILE_PATH: "docker/udm-transformer/Dockerfile"
  - IMAGE_NAME: "provisioning-e2e-tests"
    DOCKERFILE_PATH: "docker/e2e-test/Dockerfile"

container-build:
  parallel:
    matrix: *build-matrix
  variables:
    KANIKO_BUILD_CONTEXT: "${CI_PROJECT_DIR}"

# Base e2e job. Concrete per-runner jobs below extend it and only override tags,
# so we can compare e2e wall-clock across dae-s/m/l/xl. Hidden (leading dot) =>
# never runs on its own.
.e2e-test:
  stage: "test"
  image: "docker:29.6.1"
  needs:
    # RELEASE_VERSION dotenv (image tag) + the freshly built images.
    - "pre-semantic-release"
    - "container-build"
  before_script:
    # Point the compose stack at the images we just built for this commit instead
    # of a pinned published release.
    - export IMAGE_TAG="${RELEASE_VERSION}"
    - echo "Using IMAGE_TAG=${IMAGE_TAG}"
    # Inherited DOCKER_API_VERSION=1.39 (old dind leftover) downgrades the client
    # and the 29.x host daemon rejects it; unset so the client negotiates.
    - unset DOCKER_API_VERSION
    # DooD bind-mount fix, no runner-config change: the job's checkout is NOT on
    # the host daemon's filesystem, so the compose file's relative binds
    # (./nats.dev.conf, ./tests/..., ./e2e_tests/...) would resolve to empty dirs.
    # Materialize the checkout onto the host at the SAME absolute path via the
    # Docker API (client-side tar -> helper with host root mounted) so the daemon
    # finds the files. Cleaned up in after_script.
    - tar -C "$CI_PROJECT_DIR" -cf - . | docker run -i --rm -v /:/host alpine sh -c "mkdir -p /host${CI_PROJECT_DIR} && tar -C /host${CI_PROJECT_DIR} -xf -"
    - docker version
    - docker compose config e2e-test
    # The GitLab registry is S3-backed and intermittently returns 503 on blob
    # GETs, which aborts `up`. Pre-pull all needed images with retries so a
    # transient blip doesn't fail the job.
    - |
      services="provisioning-api nats1 nats2 nats3 dispatcher prefill udm-transformer udm-rest-api udm-rest-api-1 udm-listener ldap-notifier ldap-server e2e-test"
      n=0
      until docker compose pull --quiet $services; do
        n=$((n+1)); [ "$n" -ge 5 ] && echo "compose pull failed after $n attempts" && exit 1
        echo "compose pull failed (attempt $n) — retrying in 10s"; sleep 10
      done
    - docker compose up --no-build --quiet-pull --wait --wait-timeout 60 provisioning-api nats1 nats2 nats3 dispatcher prefill udm-transformer udm-listener ldap-notifier udm-rest-api ldap-server
  script:
    # Wait for the UDM Listener to get ready. (Not worth fixing properly atm.)
    - sleep 10
    # `run` has no --no-build flag; the image is already pre-pulled above, so it
    # runs the existing image without building.
    - docker compose run --rm e2e-test
  after_script:
    - unset DOCKER_API_VERSION
    - docker ps -a
    - docker logs provisioning-api             > provisioning-api.log       2>&1 || true
    - docker logs provisioning-dispatcher      > dispatcher.log            2>&1 || true
    - docker logs provisioning-prefill         > prefill.log               2>&1 || true
    - docker logs provisioning-udm-transformer > udm-transformer.log     2>&1 || true
    - docker logs udm-listener                 > udm-listener.log          2>&1 || true
    - docker logs ldap-notifier                >& ldap-notifier.log
    - docker logs ldap-server                  > ldap-server.log           2>&1 || true
    - docker logs udm-rest-api                 > udm-rest-api.log          2>&1 || true
    - docker compose down --volumes --remove-orphans || true
    # Remove the materialized copy from the (ephemeral) host.
    - docker run --rm -v /:/host alpine sh -c "rm -rf /host${CI_PROJECT_DIR}" || true
  artifacts:
    paths:
      - provisioning-api.log
      - dispatcher.log
      - prefill.log
      - udm-transformer.log
      - udm-listener.log
      - ldap-notifier.log
      - ldap-server.log
      - udm-rest-api.log
    expire_in: "1 day"
    when: "always"
    expose_as: "docker compose server logs"

# Per-runner jobs: identical work, only the tag differs. Compare their durations
# in the pipeline view to gauge e2e performance across the dae flavors.
e2e-dae-s:
  extends: ".e2e-test"
  tags:
    - "dae-s"

e2e-dae-m:
  extends: ".e2e-test"
  tags:
    - "dae-m"

e2e-dae-l:
  extends: ".e2e-test"
  tags:
    - "dae-l"

e2e-dae-xl:
  extends: ".e2e-test"
  tags:
    - "dae-xl"

...
