# SPDX-FileCopyrightText: 2024 Univention GmbH
#
# Minimal e2e test setup on the dae-* runners via Docker-outside-of-Docker (DooD).
#   pre-semantic-release  -> only to populate RELEASE_VERSION (=> IMAGE_TAG)
#   test-end-to-end       -> run the compose stack against the HOST docker daemon
#                            (mounted /var/run/docker.sock), no docker:dind
#                            sidecar, no container builds.
#
# The full pipeline is parked in .gitlab-ci.yml-old (recover from git history).

---

include:
  - project: "univention/dev/nubus-for-k8s/common-ci"
    ref: "v1.61.2"
    file:
      # Provides .pre-semantic-release (publishes RELEASE_VERSION as a dotenv).
      - "templates/semantic-release-env.yaml"

stages:
  - "test"

default:
  tags:
    - "dae-s"

variables:
  # DooD: talk to the host daemon via the mounted socket, not a dind service.
  DOCKER_HOST: "unix:///var/run/docker.sock"
  # Make the test-profile services (e2e-test) addressable by pull/run.
  COMPOSE_PROFILES: "test"

# Runs in the built-in ".pre" stage; exports RELEASE_VERSION via deploy.env.
pre-semantic-release:
  extends: ".pre-semantic-release"

test-end-to-end:
  stage: "test"
  image: "docker:29.6.1"
  needs:
    # Pulls in the RELEASE_VERSION dotenv from the pre step.
    - "pre-semantic-release"
  before_script:
    # Inherited DOCKER_API_VERSION=1.39 (old dind leftover) downgrades the client
    # and the 29.x host daemon rejects it; unset so the client negotiates.
    - unset DOCKER_API_VERSION
    # Using :latest images (no builds). IMAGE_TAG left unset so compose falls back
    # to ${IMAGE_TAG:-latest}. RELEASE_VERSION from pre-semantic-release is still
    # available as a CI var if needed.
    # DooD bind-mount fix, no runner-config change: the job's checkout is NOT on
    # the host daemon's filesystem, so the compose file's relative binds
    # (./nats.dev.conf, ./tests/..., ./e2e_tests/...) would resolve to empty dirs.
    # Materialize the checkout onto the host at the SAME absolute path via the
    # Docker API (client-side tar -> helper with host root mounted) so the daemon
    # finds the files. Cleaned up in after_script.
    - tar -C "$CI_PROJECT_DIR" -cf - . | docker run -i --rm -v /:/host alpine sh -c "mkdir -p /host${CI_PROJECT_DIR} && tar -C /host${CI_PROJECT_DIR} -xf -"
    - docker version
    - docker compose config e2e-test
    # The GitLab registry is S3-backed and intermittently returns 503 on blob
    # GETs, which aborts `up`. Pre-pull all needed images with retries so a
    # transient blip doesn't fail the job.
    - |
      services="provisioning-api nats1 nats2 nats3 dispatcher prefill udm-transformer udm-rest-api udm-rest-api-1 udm-listener ldap-notifier ldap-server e2e-test"
      n=0
      until docker compose pull --quiet $services; do
        n=$((n+1)); [ "$n" -ge 5 ] && echo "compose pull failed after $n attempts" && exit 1
        echo "compose pull failed (attempt $n) — retrying in 10s"; sleep 10
      done
    - docker compose up --no-build --quiet-pull --wait --wait-timeout 60 provisioning-api nats1 nats2 nats3 dispatcher prefill udm-transformer udm-listener ldap-notifier udm-rest-api ldap-server
  script:
    # Wait for the UDM Listener to get ready. (Not worth fixing properly atm.)
    - sleep 10
    - docker compose run --quiet-pull --rm e2e-test
  after_script:
    - unset DOCKER_API_VERSION
    - docker ps -a
    - docker logs provisioning-api          > provisioning-api.log       2>&1 || true
    - docker logs provisioning-dispatcher    > dispatcher.log            2>&1 || true
    - docker logs provisioning-prefill       > prefill.log               2>&1 || true
    - docker logs provisioning-udm-transformer > udm-transformer.log     2>&1 || true
    - docker logs udm-listener               > udm-listener.log          2>&1 || true
    - docker logs ldap-server                > ldap-server.log           2>&1 || true
    - docker logs udm-rest-api               > udm-rest-api.log          2>&1 || true
    - docker compose down --volumes --remove-orphans || true
    # Remove the materialized copy from the (ephemeral) host.
    - docker run --rm -v /:/host alpine sh -c "rm -rf /host${CI_PROJECT_DIR}" || true
  artifacts:
    paths:
      - provisioning-api.log
      - dispatcher.log
      - prefill.log
      - udm-transformer.log
      - udm-listener.log
      - ldap-server.log
      - udm-rest-api.log
    expire_in: "1 day"
    when: "always"
    expose_as: "docker compose server logs"

...
