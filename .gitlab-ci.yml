#
# Barebones DooD (Docker-outside-of-Docker) smoke test.
# Purpose: fast pipeline turnaround while validating that the dae-* runners can
# run docker workloads against the HOST daemon (mounted /var/run/docker.sock),
# instead of a docker:dind service sidecar.
#
# The real pipeline is parked in .gitlab-ci.yml-old. Restore it once DooD is proven.
#
# No includes, no build matrix, one job -> pushes finish in seconds.

---

stages:
  - "test"

variables:
  # Target the host daemon via the mounted socket, NOT a dind service.
  DOCKER_HOST: "unix:///var/run/docker.sock"

dood-smoke:
  stage: "test"
  tags:
    - "dae-s"
  image: "docker:29.6.1"
  script:
    # An inherited CI/CD var DOCKER_API_VERSION=1.39 (leftover from the old dind
    # service) force-pins the client API and the 29.x host daemon rejects it
    # (needs >= 1.40). Unset it so the client negotiates. See the old e2e job.
    - unset DOCKER_API_VERSION
    # 1. Reach the host daemon from inside the job container.
    - echo "== docker version (client in job, server on host) =="
    - docker version

    # 2. Start a sibling container on the host from inside the job container.
    - echo "== nested 'docker run' =="
    - docker run --rm alpine:3.20 echo "nested-container-ok"

    # 3. The DooD gotcha: relative bind-mounts are resolved by the HOST daemon,
    #    so the job workdir must be a host path mounted at the same absolute path.
    #    compose up a one-service stack with a relative bind mount to prove it.
    - echo "== docker compose up over host socket, with a relative bind mount =="
    - echo "marker-${CI_JOB_ID}" > marker
    - |
      cat > docker-compose.yml <<'YAML'
      services:
        hello:
          image: alpine:3.20
          command: ["sh", "-c", "cat /marker && echo compose-dood-ok"]
          volumes:
            - ./marker:/marker:ro
      YAML
    - docker compose up --abort-on-container-exit --exit-code-from hello
  after_script:
    - docker compose down --volumes --remove-orphans || true

# Runs the full probe FROM INSIDE a job container, so it reports what the runner
# actually grants a job (socket mount, --privileged, bind-mount path consistency)
# -- as opposed to the standalone-VM run. Diagnostic: reads OK/FAIL in the log.
# Needs dood-capabilities.sh committed to the repo. The docker:* image is Alpine
# with no bash (the script uses bash arrays), so install it first.
dood-capabilities:
  stage: "test"
  tags:
    - "dae-s"
  image: "docker:29.6.1"
  script:
    - unset DOCKER_API_VERSION   # see dood-smoke: inherited 1.39 pin breaks the 29.x daemon
    - apk add --no-cache bash
    - bash ./dood-capabilities.sh

...
